steps:
  - action: takeoff
    params:
      takeoff_altitude: 40.0
      vtol_transition_heading: 330.0
      vtol_loiter_nord: 100.0
      vtol_loiter_east: 100.0
      vtol_loiter_alt: 80.0
      
  - action: orbit
    params:
      east: 30.0
      north: 150.0
      altitude: 90.0
      radius: 40.0
  - action: wait
    params:
      duration: 60.0
      
  - action: land
    params:
      landing_altitude: 40.0
      vtol_transition_heading: 60.0

run_with:
  ros2 run mission mission --conops yalla.yaml --ros-args -r __ns:=/Drone$DRONE_ID -p use_sim_time:=true
